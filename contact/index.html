<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yenna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2EAB6F; 
            --text-color: #000000;
            --border-color: #000000; 
            --moschino-red: #E32636; 
            --moschino-yellow: #FFC000; 
        }

        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.8; letter-spacing: 0.02em; display: flex; flex-direction: column; min-height: 100vh; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 4px solid var(--border-color); background-color: var(--bg-color); }
        .nav-back, .lang-btn { background-color: var(--text-color); color: #fff; border: none; padding: 8px 16px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background-color 0.3s ease; }
        .nav-back:hover, .lang-btn:hover { background-color: var(--moschino-red); }
        
        .container { max-width: 700px; margin: auto; padding: 40px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        
        h1 { font-size: 4rem; font-weight: 900; letter-spacing: 0.05em; margin: 0 0 20px 0; text-transform: uppercase; text-shadow: 3px 3px 0px var(--border-color); color: var(--moschino-yellow); }
        .subtitle { font-size: 1rem; font-weight: 700; letter-spacing: 0.15em; color: var(--text-color); text-transform: uppercase; margin-bottom: 40px; line-height: 2; background-color: #fff; display: inline-block; padding: 10px 20px; border: 3px solid var(--border-color); }
        
        .email-btn { display: inline-block; padding: 15px 30px; border: 4px solid var(--border-color); background-color: var(--moschino-red); color: #fff; text-decoration: none; font-size: 1.2rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; transition: transform 0.3s ease, box-shadow 0.3s ease; margin-bottom: 10px; }
        .email-btn:hover { transform: translate(-5px, -5px); box-shadow: 8px 8px 0px var(--border-color); }

        .direct-email { font-size: 0.9rem; font-weight: 700; margin-bottom: 50px; background-color: var(--text-color); color: #fff; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .direct-email strong { user-select: all; cursor: pointer; color: var(--moschino-yellow); }

        .contact-links { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .contact-item { background-color: #fff; color: var(--text-color); font-size: 1rem; font-weight: 900; text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 25px; border: 3px solid var(--border-color); transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease; }
        .contact-item:hover { background-color: var(--moschino-yellow); transform: translate(-3px, -3px); box-shadow: 5px 5px 0px var(--border-color); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="nav-back lang-text" data-en="← BACK" data-es="← VOLVER">← BACK</a>
        <button id="lang-toggle" class="lang-btn">ESP</button>
    </div>

    <div class="container">
        <h1 class="lang-text" data-en="CONTACT" data-es="CONTACTO">CONTACT</h1>
        <p class="subtitle lang-text" data-en="Currently open for new opportunities.<br>Based in Argentina (GMT-3)." data-es="Actualmente disponible para nuevas oportunidades.<br>Base en Argentina (GMT-3).">Currently open for new opportunities.<br>Based in Argentina (GMT-3).</p>

        <a href="mailto:yenna.gamedev@gmail.com" class="email-btn lang-text" data-en="SEND AN EMAIL" data-es="ENVIAR UN CORREO">SEND AN EMAIL</a>
        
        <p class="direct-email">
            <span class="lang-text" data-en="or copy:" data-es="o copia:">or copy:</span> 
            <strong>yenna.gamedev@gmail.com</strong>
        </p>

        <div class="contact-links">
            <a href="https://www.linkedin.com/in/zabalavalen/" target="_blank" class="contact-item">LinkedIn</a>
            <a href="https://github.com/Yenna09" target="_blank" class="contact-item">GitHub</a>
            <a href="https://yenna019.itch.io/" target="_blank" class="contact-item">Itch.io</a>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('lang-toggle');
        let isEnglish = true;
        toggleBtn.addEventListener('click', () => {
            isEnglish = !isEnglish;
            toggleBtn.textContent = isEnglish ? 'ESP' : 'ENG';
            document.querySelectorAll('.lang-text').forEach(el => {
                el.textContent = isEnglish ? el.getAttribute('data-en') : el.getAttribute('data-es');

                // 2. SISTEMA DE AUDIO INTERACTIVO
        const uiSound = new Audio('../assets/Click.mp3.ogg'); 
        uiSound.volume = 0.4; 

        const clickables = document.querySelectorAll('.lang-btn, .portfolio-item, .nav-back, .email-btn, .contact-item, .btn-link');

        clickables.forEach(item => {
            item.addEventListener('mousedown', () => {
                uiSound.currentTime = 0; 
                uiSound.play();
            });
        });
    </script>
</body>
</html>
