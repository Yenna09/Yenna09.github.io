<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yenna</title>
    <!-- Cargamos Inter para emular a la perfección la Helvetica de image_3544e0.png -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Paleta extraída exclusivamente de image_3544e0.png */
        :root {
            --bg-color: #A72536;        /* Brown Red (Base sólida y seria) */
            --text-main: #E9FAFF;       /* Azure Mist (Lectura ultra limpia) */
            --accent-yellow: #E8E85A;   /* Canary Yellow (Shock de atención) */
            --accent-pink: #FB4F8E;     /* Wild Strawberry (Interacción pop) */
            --border-color: #76A6ED;    /* Cool Horizon (Líneas estructurales) */
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.8; 
            letter-spacing: 0.01em; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            border-bottom: 3px solid var(--border-color); 
            background-color: var(--bg-color); 
        }
        
        .nav-back, .lang-btn { 
            background-color: var(--text-main); 
            color: var(--bg-color); 
            border: none; 
            padding: 8px 16px; 
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', 'Inter', sans-serif; 
            font-weight: 700; 
            font-size: 0.8rem; 
            letter-spacing: 0.1em; 
            text-transform: uppercase; 
            cursor: pointer; 
            text-decoration: none; 
            transition: background-color 0.2s ease, color 0.2s ease; 
        }
        
        .nav-back:hover, .lang-btn:hover { 
            background-color: var(--accent-pink); 
            color: var(--text-main); 
        }
        
        .container { 
            max-width: 700px; 
            margin: auto; 
            padding: 40px 20px; 
            text-align: center; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        h1 { 
            font-size: 5.5rem; 
            font-weight: 900; 
            letter-spacing: -0.03em; 
            margin: 0 0 20px 0; 
            text-transform: uppercase; 
            color: var(--accent-yellow); 
            text-shadow: 4px 4px 0px var(--accent-pink); 
        }
        
        .subtitle { 
            font-size: 1rem; 
            font-weight: 700; 
            letter-spacing: 0.15em; 
            color: var(--bg-color); 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            line-height: 2; 
            background-color: var(--text-main); 
            display: inline-block; 
            padding: 10px 20px; 
            border: 2px solid var(--accent-yellow); 
        }
        
        /* Botón de Email de alto impacto interactivo */
        .email-btn { 
            display: inline-block; 
            padding: 15px 35px; 
            border: 3px solid var(--text-main); 
            background-color: var(--accent-yellow); 
            color: var(--bg-color); 
            text-decoration: none; 
            font-size: 1.2rem; 
            font-weight: 900; 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease; 
            margin-bottom: 15px; 
        }
        
        .email-btn:hover { 
            transform: translate(-4px, -4px); 
            box-shadow: 6px 6px 0px var(--accent-pink); 
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .direct-email { 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin-bottom: 50px; 
            background-color: #00000033; /* Fondo sutil traslúcido para legibilidad */
            color: var(--text-main); 
            display: inline-block; 
            padding: 6px 18px; 
            letter-spacing: 0.05em;
        }
        
        .direct-email strong { 
            user-select: all; 
            cursor: pointer; 
            color: var(--accent-yellow); 
        }

        /* Bloques de Redes Sociales Brutalistas */
        .contact-links { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .contact-item { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-size: 1rem; 
            font-weight: 900; 
            text-decoration: none; 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
            padding: 12px 30px; 
            border: 3px solid var(--border-color); 
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, color 0.2s ease; 
        }
        
        .contact-item:hover { 
            background-color: var(--accent-pink); 
            color: var(--text-main);
            border-color: var(--text-main);
            transform: translate(-4px, -4px); 
            box-shadow: 5px 5px 0px var(--accent-yellow); 
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="nav-back lang-text" data-en="← BACK" data-es="← VOLVER">← BACK</a>
        <button id="lang-toggle" class="lang-btn">ESP</button>
    </div>

    <div class="container">
        <h1 class="lang-text" data-en="CONTACT" data-es="CONTACTO">CONTACT</h1>
        <p class="subtitle lang-text" data-en="Currently open for new opportunities. Based in Argentina (GMT-3)." data-es="Actualmente disponible para nuevas oportunidades. Base en Argentina (GMT-3).">Currently open for new opportunities. <br>Based in Argentina (GMT-3).</p>

        <a href="mailto:yenna.gamedev@gmail.com" class="email-btn lang-text" data-en="SEND AN EMAIL" data-es="ENVIAR UN CORREO">SEND AN EMAIL</a>
        
        <p class="direct-email">
            <span class="lang-text" data-en="or copy:" data-es="o copia:">or copy:</span> 
            <strong>yenna.gamedev@gmail.com</strong>
        </p>

        <div class="contact-links">
            <a href="https://www.linkedin.com/in/zabalavalen/" target="_blank" class="contact-item">LinkedIn</a>
            <a href="https://github.com/Yenna09" target="_blank" class="contact-item">GitHub</a>
            <a href="https://yenna019.itch.io/" target="_blank" class="contact-item">Itch.io</a>
        </div>
    </div>

    <script>
        // 1. SISTEMA DE IDIOMAS
        const toggleBtn = document.getElementById('lang-toggle');
        let isEnglish = true;
        toggleBtn.addEventListener('click', () => {
            isEnglish = !isEnglish;
            toggleBtn.textContent = isEnglish ? 'ESP' : 'ENG';
            document.querySelectorAll('.lang-text').forEach(el => {
                el.textContent = isEnglish ? el.getAttribute('data-en') : el.getAttribute('data-es');
            });
        });

        // 2. SISTEMA DE AUDIO INTERACTIVO
        const uiSound = new Audio('../assets/Click.mp3.ogg'); 
        uiSound.volume = 0.4; 

        const clickables = document.querySelectorAll('.lang-btn, .portfolio-item, .nav-back, .email-btn, .contact-item, .btn-link');

        clickables.forEach(item => {
            item.addEventListener('mousedown', () => {
                uiSound.currentTime = 0; 
                uiSound.play();
            });
        });
    </script>
</body>
</html>
