<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yenna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #ffffff; --text-color: #000000; --border-color: #e0e0e0; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.8; letter-spacing: 0.05em; display: flex; flex-direction: column; min-height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .nav-back, .lang-btn { background: none; border: none; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; color: #555; text-decoration: none; transition: color 0.3s ease; }
        .nav-back:hover, .lang-btn:hover { color: #000; }
        .container { max-width: 600px; margin: auto; padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.15em; margin: 0 0 20px 0; text-transform: uppercase; }
        .subtitle { font-size: 0.85rem; font-weight: 400; letter-spacing: 0.15em; color: #666; text-transform: uppercase; margin-bottom: 40px; line-height: 2; }
        
        /* Enlaces de contacto estilo minimalista */
        .contact-links { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 50px; }
        .contact-item { font-size: 1rem; font-weight: 300; color: var(--text-color); text-decoration: none; letter-spacing: 0.1em; border-bottom: 1px solid transparent; transition: border-color 0.3s ease; padding-bottom: 5px; }
        .contact-item:hover { border-bottom: 1px solid var(--text-color); }
        
        .email-btn { display: inline-block; padding: 15px 30px; border: 1px solid var(--text-color); color: var(--text-color); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.4s ease; margin-bottom: 40px; }
        .email-btn:hover { background-color: var(--text-color); color: var(--bg-color); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="nav-back lang-text" data-en="← Back" data-es="← Volver">← Back</a>
        <button id="lang-toggle" class="lang-btn">ESP</button>
    </div>

    <div class="container">
        <h1 class="lang-text" data-en="Contact" data-es="Contacto">Contact</h1>
        <p class="subtitle lang-text" data-en="Currently open for new opportunities.<br>Based in Argentina (GMT-3)." data-es="Actualmente disponible para nuevas oportunidades.<br>Base en Argentina (GMT-3).">Currently open for new opportunities.<br>Based in Argentina (GMT-3).</p>

        <a href="mailto:yenna.gamedev@gmail.com" class="email-btn lang-text" data-en="Send an Email" data-es="Enviar un Correo">Send an Email</a>
        <div class="contact-links">
            <a href="https://www.linkedin.com/in/zabalavalen/?locale=en-US" target="_blank" class="contact-item">LinkedIn</a>
            <a href="https://github.com/Yenna09" target="_blank" class="contact-item">GitHub</a>
            <a href="https://yenna019.itch.io/" target="_blank" class="contact-item">Itch.io</a>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('lang-toggle');
        let isEnglish = true;
        toggleBtn.addEventListener('click', () => {
            isEnglish = !isEnglish;
            toggleBtn.textContent = isEnglish ? 'ESP' : 'ENG';
            document.querySelectorAll('.lang-text').forEach(el => {
                el.textContent = isEnglish ? el.getAttribute('data-en') : el.getAttribute('data-es');
            });
        });
    </script>
</body>
</html>
