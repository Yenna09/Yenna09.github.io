<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art & Visuals | Yenna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #2EAB6F; --text-color: #000000; --border-color: #000000; --moschino-red: #E32636; --moschino-yellow: #FFC000; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.8; letter-spacing: 0.02em; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 4px solid var(--border-color); background-color: var(--bg-color); }
        .nav-back, .lang-btn { background-color: var(--text-color); color: #fff; border: none; padding: 8px 16px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background-color 0.3s ease; }
        .nav-back:hover, .lang-btn:hover { background-color: var(--moschino-red); }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: left; padding: 2vh 0 6vh 0; border-bottom: 4px solid var(--border-color); margin-bottom: 50px; }
        h1 { font-size: 3rem; font-weight: 900; letter-spacing: 0.05em; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 2px 2px 0px var(--border-color); color: var(--moschino-yellow); }
        .subtitle { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.15em; color: var(--bg-color); text-transform: uppercase; background-color: var(--text-color); display: inline-block; padding: 5px 15px; border: 2px solid var(--border-color); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-bottom: 70px; }
        .gallery-item { background-color: #fff; padding: 15px; border: 4px solid var(--border-color); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .gallery-item:hover { transform: translate(-5px, -5px); box-shadow: 10px 10px 0px var(--border-color); }
        
        .image-placeholder { width: 100%; aspect-ratio: 1 / 1; background-color: var(--moschino-yellow); border: 3px solid var(--border-color); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: var(--text-color); font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .gallery-item h3 { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.05em; margin: 0 0 5px 0; text-transform: uppercase; }
        .gallery-item p { font-size: 0.85rem; font-weight: 700; color: #555; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="nav-back lang-text" data-en="← BACK" data-es="← VOLVER">← BACK</a>
        <button id="lang-toggle" class="lang-btn">ESP</button>
    </div>

    <div class="container">
        <header>
            <h1 class="lang-text" data-en="Pixel Art & Visuals" data-es="Pixel Art y Dirección Visual">Pixel Art & Visuals</h1>
            <p class="subtitle lang-text" data-en="Visual direction, sprites, animations, and color palettes." data-es="Dirección visual, sprites, animaciones y paletas de colores.">Visual direction, sprites, animations, and color palettes.</p>
        </header>

        <main>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <div class="image-placeholder lang-text" data-en="IMAGE" data-es="IMAGEN">IMAGE</div>
                    <h3 class="lang-text" data-en="Character Design" data-es="Diseño de Personajes">Character Design</h3>
                    <p class="lang-text" data-en="Protagonists and NPCs" data-es="Protagonistas y NPCs">Protagonists and NPCs</p>
                </div>
                <div class="gallery-item">
                    <div class="image-placeholder lang-text" data-en="IMAGE" data-es="IMAGEN">IMAGE</div>
                    <h3 class="lang-text" data-en="Environment Art" data-es="Arte de Entornos">Environment Art</h3>
                    <p class="lang-text" data-en="Tilesets and backgrounds" data-es="Tilesets y fondos">Tilesets and backgrounds</p>
                </div>
                <div class="gallery-item">
                    <div class="image-placeholder lang-text" data-en="IMAGE" data-es="IMAGEN">IMAGE</div>
                    <h3 class="lang-text" data-en="UI Elements" data-es="Elementos de Interfaz">UI Elements</h3>
                    <p class="lang-text" data-en="Icons, menus, and HUDs" data-es="Íconos, menús y HUDs">Icons, menus, and HUDs</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const toggleBtn = document.getElementById('lang-toggle');
        let isEnglish = true;
        toggleBtn.addEventListener('click', () => {
            isEnglish = !isEnglish;
            toggleBtn.textContent = isEnglish ? 'ESP' : 'ENG';
            document.querySelectorAll('.lang-text').forEach(el => {
                el.textContent = isEnglish ? el.getAttribute('data-en') : el.getAttribute('data-es');

                 });
        });

                // 2. SISTEMA DE AUDIO INTERACTIVO
        const uiSound = new Audio('../assets/Click.mp3.ogg'); 
        uiSound.volume = 0.4; 

        const clickables = document.querySelectorAll('.lang-btn, .portfolio-item, .nav-back, .email-btn, .contact-item, .btn-link');

        clickables.forEach(item => {
            item.addEventListener('mousedown', () => {
                uiSound.currentTime = 0; 
                uiSound.play();
            });
        });
    </script>
</body>
</html>
